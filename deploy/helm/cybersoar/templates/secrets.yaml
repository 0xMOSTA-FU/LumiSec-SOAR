apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: cybersoar
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  mongodb-uri: {{ .Values.secrets.mongodbUri | quote }}
  redis-url: {{ .Values.secrets.redisUrl | quote }}
  webhook-secret: {{ .Values.secrets.webhookSecret | quote }}
  encryption-key: {{ .Values.secrets.encryptionKey | quote }}
  nextauth-secret: {{ .Values.secrets.nextauthSecret | quote }}
  jwt-secret: {{ .Values.secrets.jwtSecret | quote }}

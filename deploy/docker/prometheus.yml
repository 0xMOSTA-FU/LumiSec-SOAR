# Prometheus scrape config for SOAR platform
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'soar-prod'
    environment: 'production'

scrape_configs:
  - job_name: 'soar-web'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['soar-web:3000']
        labels:
          service: 'soar-web'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'soar-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['soar-backend:4000']
        labels:
          service: 'soar-backend'

  - job_name: 'mongo'
    static_configs:
      - targets: ['mongo:27017']
        labels:
          service: 'mongodb'
    # MongoDB exporter would go here — see helm chart for production setup

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
        labels:
          service: 'redis'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
rule_files:
  - /etc/prometheus/rules/*.yml
